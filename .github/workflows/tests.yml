name: Tests

"on":
  push:
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # actions/setup-python's built-in pip cache is the current standard
          # way to cache dependencies between runs — keyed on requirements.txt,
          # so a pin/version bump there invalidates the cache automatically.
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # tests/ never makes a real OpenAI call — every LLM/embedding-backed
          # function is mocked (see each test file's own docstring) — but the
          # openai SDK's client constructor itself requires a syntactically
          # present key, so this only needs to be non-empty, never valid or
          # secret. No repository secret setup required to run this workflow.
          OPENAI_API_KEY: sk-test-dummy-not-real
        run: pytest tests/ -v
